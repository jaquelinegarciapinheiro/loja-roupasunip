<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Loja de Roupas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: black;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #produtos {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .produto {
      background: white;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      transition: 0.2s;
    }

    .produto:hover {
      transform: scale(1.05);
    }

    .produto img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    button {
      padding: 8px 12px;
      margin-top: 10px;
      border: none;
      background: black;
      color: white;
      cursor: pointer;
    }

    #carrinho-btn {
      position: fixed;
      right: 20px;
      top: 20px;
      font-size: 20px;
    }

    #contador-carrinho {
      background: red;
      color: white;
      padding: 3px 7px;
      border-radius: 50%;
      position: absolute;
      top: -10px;
      right: -10px;
      font-size: 12px;
    }

    #carrinho {
      position: fixed;
      right: -300px;
      top: 0;
      width: 300px;
      height: 100%;
      background: white;
      padding: 15px;
      transition: 0.3s;
      overflow-y: auto;
    }

    #carrinho.ativo {
      right: 0;
    }

    .item-carrinho {
      border-bottom: 1px solid #ccc;
      margin-bottom: 10px;
      padding-bottom: 10px;
    }
  </style>
</head>

<body>

<header>
  <h2>🛍️ Minha Loja</h2>
</header>

<!-- BOTÃO CARRINHO -->
<button id="carrinho-btn">
  🛒
  <span id="contador-carrinho">0</span>
</button>

<!-- PRODUTOS -->
<div id="produtos"></div>

<!-- CARRINHO -->
<div id="carrinho">
  <button id="fechar-carrinho">Fechar</button>

  <h3>Carrinho</h3>

  <div id="carrinho-itens"></div>

  <p>Total: R$ <span id="total">0</span></p>

  <button onclick="finalizarPedido()">Finalizar Pedido</button>
</div>

<!-- SCRIPT -->
<script src="script.js"></script>

</body>
</html>
